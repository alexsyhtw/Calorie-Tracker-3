<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="熱量追蹤">
<meta name="theme-color" content="#FF6B00">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>熱量追蹤</title>
<style>
:root{--bg:#f2f2f7;--card:#fff;--text:#000;--text2:#6c6c70;--text3:#aeaeb2;--sep:rgba(60,60,67,0.12);--input-bg:#f2f2f7;--brand:#FF6B00;--green:#34C759;--red:#FF3B30;--nav-bg:rgba(249,249,249,0.94)}
@media(prefers-color-scheme:dark){:root{--bg:#000;--card:#1c1c1e;--text:#fff;--text2:#98989d;--text3:#636366;--sep:rgba(255,255,255,0.1);--input-bg:#2c2c2e;--nav-bg:rgba(28,28,30,0.94)}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.status-spacer{height:env(safe-area-inset-top,44px);background:var(--card)}
.nav-header{background:var(--card);border-bottom:0.5px solid var(--sep);padding:12px 20px 10px;flex-shrink:0}
.nav-header h1{font-size:17px;font-weight:600;text-align:center;color:var(--text)}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:8px}
.bottom-nav{background:var(--nav-bg);border-top:0.5px solid var(--sep);display:flex;padding-top:8px;padding-bottom:env(safe-area-inset-bottom,16px);flex-shrink:0;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 0 2px;font-family:inherit;color:var(--text3);font-size:10px;transition:color 0.15s}
.nav-btn.active{color:var(--brand)}
.nav-btn svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.page{display:none}.page.active{display:block}
.card{background:var(--card);border-radius:16px;margin-bottom:16px;overflow:hidden}
.card-row{padding:13px 16px;border-bottom:0.5px solid var(--sep);display:flex;align-items:center;gap:12px}
.card-row:last-child{border-bottom:none}
.card-row label{font-size:16px;color:var(--text);flex:1;cursor:pointer}
.card-row input[type=text],.card-row input[type=number],.card-row input[type=date]{background:none;border:none;outline:none;font-size:16px;color:var(--text2);text-align:right;font-family:inherit;min-width:0;flex:1;max-width:180px}
.card-row input::placeholder{color:var(--text3)}
.card-row select{background:none;border:none;outline:none;font-size:16px;color:var(--text2);font-family:inherit;text-align:right;flex:1;cursor:pointer;max-width:200px}
.sec-hdr{padding:8px 16px 4px;font-size:13px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em}
.ios-btn{width:100%;padding:15px;border-radius:14px;border:none;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--brand);color:#fff;margin-bottom:12px;transition:opacity 0.1s,transform 0.08s;-webkit-appearance:none}
.ios-btn:active{opacity:0.75;transform:scale(0.98)}
.m2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.metric{background:var(--card);border-radius:14px;padding:14px;text-align:center}
.metric-num{font-size:26px;font-weight:700;color:var(--text)}
.metric-sub{font-size:12px;color:var(--text2);margin-top:3px}
.hero{background:var(--brand);border-radius:20px;padding:20px;margin-bottom:16px;color:#fff}
.hero-lbl{font-size:13px;opacity:0.85;margin-bottom:4px}
.hero-val{font-size:38px;font-weight:700}
.hero-sub{font-size:14px;opacity:0.8;margin-top:6px}
.pbg{background:rgba(255,255,255,0.28);border-radius:99px;height:6px;margin-top:14px;overflow:hidden}
.pfill{height:100%;border-radius:99px;background:#fff;transition:width 0.4s cubic-bezier(.4,0,.2,1)}
.food-item{padding:12px 16px;border-bottom:0.5px solid var(--sep);display:flex;align-items:center;justify-content:space-between}
.food-item:last-child{border-bottom:none}
.fdel{width:30px;height:30px;border-radius:50%;background:rgba(255,59,48,0.12);border:none;cursor:pointer;color:var(--red);font-size:15px;display:flex;align-items:center;justify-content:center;margin-left:12px;flex-shrink:0}
.empty{text-align:center;padding:24px 16px;color:var(--text2);font-size:15px}
.tgl-row{padding:13px 16px;display:flex;align-items:center;justify-content:space-between}
.tgl{width:51px;height:31px;border-radius:16px;background:#e5e5ea;position:relative;cursor:pointer;transition:background .25s;flex-shrink:0;border:none}
@media(prefers-color-scheme:dark){.tgl{background:#39393d}}
.tgl.on{background:var(--green)}
.tgl-knob{width:27px;height:27px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:0 2px 6px rgba(0,0,0,0.18)}
.tgl.on .tgl-knob{transform:translateX(20px)}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 16px}
.tbtn{background:var(--input-bg);border:2px solid transparent;border-radius:14px;padding:14px 8px;cursor:pointer;text-align:center;font-family:inherit;color:var(--text);transition:all .15s;font-size:14px;font-weight:500}
.tbtn svg{width:28px;height:28px;stroke:var(--text2);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;display:block;margin:0 auto 6px}
.tbtn.sel{border-color:var(--brand);background:rgba(255,107,0,0.1)}
.tbtn.sel svg{stroke:var(--brand)}
.tbtn:active{transform:scale(0.95)}
.chip{display:inline-block;font-size:13px;font-weight:500;padding:5px 12px;border-radius:99px;margin-bottom:14px}
.chip-brand{background:rgba(255,107,0,0.12);color:var(--brand)}
.chip-gray{background:var(--input-bg);color:var(--text2)}
.bdg{display:inline-block;font-size:13px;font-weight:600;padding:4px 12px;border-radius:99px}
.bdg-g{background:rgba(52,199,89,0.15);color:#1a7a32}
.bdg-r{background:rgba(255,59,48,0.12);color:#c0392b}
@media(prefers-color-scheme:dark){.bdg-g{color:#34c759}.bdg-r{color:#ff453a}}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,20px) + 80px);left:50%;transform:translateX(-50%);background:rgba(50,50,50,0.9);color:#fff;padding:10px 20px;border-radius:99px;font-size:14px;font-weight:500;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s;z-index:9999;max-width:90vw}
.toast.show{opacity:1}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

/* chart page */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.month-nav button{background:none;border:none;cursor:pointer;color:var(--brand);font-size:22px;padding:4px 12px;font-family:inherit}
.month-nav span{font-size:17px;font-weight:600;color:var(--text)}
.chart-card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:16px}
.chart-title{font-size:13px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:14px}
canvas{width:100%!important;display:block}
.legend{display:flex;gap:16px;margin-top:10px;justify-content:center}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.w-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:0.5px solid var(--sep);font-size:15px}
.w-row:last-child{border-bottom:none}
.w-date{color:var(--text2);font-size:13px}
.w-kg{font-weight:600;color:var(--text)}
.w-diff{font-size:12px;padding:2px 8px;border-radius:99px;margin-left:8px}
.w-up{background:rgba(255,59,48,0.12);color:#c0392b}
.w-dn{background:rgba(52,199,89,0.15);color:#1a7a32}
.w-eq{background:var(--input-bg);color:var(--text2)}
@media(prefers-color-scheme:dark){.w-up{color:#ff453a}.w-dn{color:#34c759}}
</style>
</head>
<body>
<div class="app">
  <div class="status-spacer"></div>
  <div class="nav-header"><h1 id="page-label">今日總覽</h1></div>

  <div class="scroll-area" id="scroll-area">

    <!-- 總覽 -->
    <div class="page active" id="page-home">
      <div class="hero">
        <div class="hero-lbl">今日攝取</div>
        <div style="display:flex;align-items:baseline;gap:8px">
          <div class="hero-val" id="h-total">0</div>
          <div style="font-size:18px;opacity:0.8">kcal</div>
        </div>
        <div class="hero-sub" id="h-sub">請先至「體重」分頁計算 TDEE</div>
        <div class="pbg"><div class="pfill" id="h-bar" style="width:0%"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;opacity:0.75;margin-top:6px">
          <span id="h-pct">0%</span><span id="h-remain">—</span>
        </div>
      </div>
      <div class="m2">
        <div class="metric"><div class="metric-num" id="h-tdee-val">—</div><div class="metric-sub">TDEE kcal</div></div>
        <div class="metric"><div class="metric-num" id="h-wt-val">—</div><div class="metric-sub">體重 kg</div></div>
      </div>
      <div class="card">
        <div class="sec-hdr" style="display:flex;justify-content:space-between;align-items:center;padding-right:16px"><span>今日飲食</span><span id="h-total-badge" style="color:var(--brand);font-weight:600;font-size:14px">0 kcal</span></div>
        <div id="h-food-list"><div class="empty">尚未記錄任何食物</div></div>
      </div>
    </div>

    <!-- 體重 & TDEE -->
    <div class="page" id="page-weight">
      <div id="week-chip" style="margin-bottom:14px"></div>
      <div class="card" style="margin-bottom:12px">
        <div class="sec-hdr">本週體重（週日紀錄）</div>
        <div class="card-row"><label for="w-kg">體重</label><input type="number" id="w-kg" step="0.1" min="30" max="200" placeholder="kg" inputmode="decimal"></div>
        <div class="card-row"><label for="w-date">日期</label><input type="date" id="w-date"></div>
      </div>
      <button class="ios-btn" onclick="saveWeight()">儲存體重</button>
      <div class="card" style="margin-bottom:12px">
        <div class="sec-hdr">TDEE 計算（Mifflin-St Jeor）</div>
        <div class="card-row"><label for="t-age">年齡</label><input type="number" id="t-age" placeholder="歲" inputmode="numeric"></div>
        <div class="card-row"><label for="t-h">身高</label><input type="number" id="t-h" placeholder="cm" inputmode="numeric"></div>
        <div class="card-row"><label for="t-sex">性別</label><select id="t-sex"><option value="male">男</option><option value="female">女</option></select></div>
        <div class="card-row"><label for="t-act">活動程度</label><select id="t-act"><option value="1.2">久坐</option><option value="1.375">輕度（週 1–3）</option><option value="1.55" selected>中度（週 3–5）</option><option value="1.725">高度（週 6–7）</option><option value="1.9">運動員</option></select></div>
      </div>
      <button class="ios-btn" onclick="calcTDEE()">計算 TDEE</button>
      <div class="m2">
        <div class="metric"><div class="metric-num" id="r-bmr">—</div><div class="metric-sub">BMR kcal</div></div>
        <div class="metric"><div class="metric-num" id="r-tdee">—</div><div class="metric-sub">TDEE kcal</div></div>
      </div>
    </div>

    <!-- 飲食 -->
    <div class="page" id="page-food">
      <div class="card" style="margin-bottom:12px">
        <div class="sec-hdr">新增食物</div>
        <div class="card-row"><label for="f-name">名稱</label><input type="text" id="f-name" placeholder="例如：雞腿便當"></div>
        <div class="card-row"><label for="f-cal">熱量</label><input type="number" id="f-cal" placeholder="kcal" inputmode="numeric"></div>
      </div>
      <button class="ios-btn" onclick="addFood()">加入記錄</button>
      <div class="card">
        <div class="sec-hdr" style="display:flex;align-items:center;justify-content:space-between;padding-right:16px">
          <span>今日清單</span><span id="f-total" style="font-size:14px;font-weight:600;color:var(--brand)">0 kcal</span>
        </div>
        <div id="f-list"><div class="empty">尚未記錄</div></div>
      </div>
    </div>

    <!-- 運動 -->
    <div class="page" id="page-exercise">
      <div class="card" style="margin-bottom:12px">
        <div class="tgl-row">
          <div>
            <div style="font-size:16px;color:var(--text)">今天有運動</div>
            <div style="font-size:13px;color:var(--text2);margin-top:2px" id="ex-hint">點擊開啟</div>
          </div>
          <button class="tgl" id="ex-tgl" onclick="toggleEx()" aria-label="今天有運動" aria-checked="false"><div class="tgl-knob"></div></button>
        </div>
        <div id="ex-detail" style="display:none;border-top:0.5px solid var(--sep)">
          <div class="sec-hdr" style="padding-top:14px">選擇運動類型</div>
          <div class="tgrid">
            <button class="tbtn" onclick="selType('weight',this)" id="tb-weight"><svg viewBox="0 0 24 24"><path d="M6 5v14M18 5v14M2 12h4M18 12h4M6 8h12M6 16h12"/></svg>重訓</button>
            <button class="tbtn" onclick="selType('run',this)" id="tb-run"><svg viewBox="0 0 24 24"><circle cx="13" cy="4" r="1"/><path d="M5 21 9 9l3 3 2-5 3 3h3"/></svg>慢跑</button>
            <button class="tbtn" onclick="selType('bike',this)" id="tb-bike"><svg viewBox="0 0 24 24"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2"/><path d="M12 17.5V14l-3-3 4-3 2 3h2"/></svg>騎腳踏車</button>
            <button class="tbtn" onclick="selType('swim',this)" id="tb-swim"><svg viewBox="0 0 24 24"><path d="M2 12c1.5 1.5 3 1.5 4.5 0s3-1.5 4.5 0 3 1.5 4.5 0 3-1.5 4.5 0"/><path d="M6 6l4 4M10 6l4 4"/><circle cx="8" cy="4" r="1.5"/></svg>游泳</button>
          </div>
          <div class="card-row" style="border-top:0.5px solid var(--sep)"><label for="ex-dur">時長</label><input type="number" id="ex-dur" placeholder="分鐘" inputmode="numeric"></div>
        </div>
      </div>
      <div id="ex-save-wrap" style="display:none"><button class="ios-btn" onclick="saveEx()">儲存運動</button></div>
      <div class="card"><div class="sec-hdr">今日摘要</div>
        <div style="padding:16px">
          <div class="m2" style="margin-bottom:12px">
            <div class="metric"><div class="metric-num" id="s-in">0</div><div class="metric-sub">攝取 kcal</div></div>
            <div class="metric"><div class="metric-num" id="s-td">—</div><div class="metric-sub">TDEE kcal</div></div>
          </div>
          <div style="text-align:center;margin-bottom:10px" id="s-bdg"></div>
          <div style="font-size:14px;color:var(--text2);text-align:center" id="s-ex">今天尚未運動</div>
        </div>
      </div>
    </div>

    <!-- 圖表 -->
    <div class="page" id="page-chart">
      <div class="month-nav">
        <button onclick="prevMonth()">‹</button>
        <span id="chart-month-label"></span>
        <button onclick="nextMonth()">›</button>
      </div>
      <div class="chart-card">
        <div class="chart-title">每日熱量 vs TDEE</div>
        <canvas id="cal-chart" height="180"></canvas>
        <div class="legend">
          <div class="leg-item"><div class="leg-dot" style="background:#FF6B00"></div>攝取</div>
          <div class="leg-item"><div class="leg-dot" style="background:rgba(0,122,255,0.5);border:2px dashed #007AFF;border-radius:0;width:16px;height:2px;margin-top:4px"></div>TDEE</div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">體重趨勢</div>
        <canvas id="wt-chart" height="160"></canvas>
      </div>
      <div class="card">
        <div class="sec-hdr">體重紀錄</div>
        <div id="wt-list"><div class="empty">尚未有紀錄</div></div>
      </div>
    </div>

  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="goPage('home')"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><path d="M9 21V12h6v9"/></svg>總覽</button>
    <button class="nav-btn" id="nav-weight" onclick="goPage('weight')"><svg viewBox="0 0 24 24"><path d="M12 3a4 4 0 0 1 4 4H8a4 4 0 0 1 4-4z"/><rect x="3" y="7" width="18" height="14" rx="2"/><path d="M8 12h8M8 16h5"/></svg>體重</button>
    <button class="nav-btn" id="nav-food" onclick="goPage('food')"><svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>飲食</button>
    <button class="nav-btn" id="nav-exercise" onclick="goPage('exercise')"><svg viewBox="0 0 24 24"><path d="M6 5v14M18 5v14M2 12h4M18 12h4M6 8h12M6 16h12"/></svg>運動</button>
    <button class="nav-btn" id="nav-chart" onclick="goPage('chart')"><svg viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>圖表</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const TITLES={home:'今日總覽',weight:'體重 & TDEE',food:'飲食紀錄',exercise:'運動紀錄',chart:'趨勢圖表'};
let S={profile:{weight:null,tdee:null,bmr:null},weightLog:[],calLog:{},foods:[],foodsDate:null,exercise:{on:false,type:'',dur:''}};
let chartMonth=new Date();chartMonth.setDate(1);

/* ── 6am day-boundary logic ── */
function logicalDateKey(d){
  d=d||new Date();
  // shift back 6 hours: 00:00–05:59 counts as the previous day
  const shifted=new Date(d.getTime()-6*60*60*1000);
  // use LOCAL date parts, not UTC, so timezone (e.g. UTC+8) is correct
  const y=shifted.getFullYear();
  const m=String(shifted.getMonth()+1).padStart(2,'0');
  const day=String(shifted.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function todayKey(){return logicalDateKey();}

function load(){try{const d=localStorage.getItem('ct3');if(d)S=JSON.parse(d);}catch(e){}}
function save(){try{localStorage.setItem('ct3',JSON.stringify(S));}catch(e){}}
load();

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function checkRollover(){
  const key=todayKey();
  if(S.foodsDate!==key){
    if(S.foodsDate){
      if(!S.calLog)S.calLog={};
      S.calLog[S.foodsDate]=(S.foods||[]).reduce((a,f)=>a+f.cal,0);
    }
    S.foods=[];
    S.foodsDate=key;
    S.exercise={on:false,type:'',dur:''};
    exSel='';
    save();
    return true;
  }
  return false;
}

function goPage(p){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
  document.getElementById('page-label').textContent=TITLES[p];
  document.getElementById('scroll-area').scrollTop=0;
  if(p==='exercise')updateSummary();
  if(p==='home')updateHome();
  if(p==='chart'){updateChartMonth();drawCharts();}
}

function initDate(){
  const d=new Date(),today=d.toISOString().split('T')[0];
  document.getElementById('w-date').value=today;
  const day=d.getDay();
  const chip=document.getElementById('week-chip');
  const span=document.createElement('span');
  span.className='chip '+(day===0?'chip-brand':'chip-gray');
  span.textContent=day===0?'今天是週日 — 紀錄體重的好時機！':'距下次週日還有 '+(7-day)+' 天';
  chip.appendChild(span);
}
initDate();

function restoreUI(){
  if(S.profile.weight){document.getElementById('h-wt-val').textContent=S.profile.weight.toFixed(1);document.getElementById('w-kg').value=S.profile.weight;}
  if(S.profile.tdee){
    document.getElementById('r-tdee').textContent=S.profile.tdee.toLocaleString();
    document.getElementById('r-bmr').textContent=S.profile.bmr?S.profile.bmr.toLocaleString():'—';
    document.getElementById('h-tdee-val').textContent=S.profile.tdee.toLocaleString();
  }
  if(S.exercise.on){
    const tog=document.getElementById('ex-tgl');
    tog.classList.add('on');tog.setAttribute('aria-checked','true');
    document.getElementById('ex-detail').style.display='block';
    document.getElementById('ex-save-wrap').style.display='block';
    document.getElementById('ex-hint').textContent='選擇類型並儲存';
    if(S.exercise.type){exSel=S.exercise.type;const tb=document.getElementById('tb-'+S.exercise.type);if(tb)tb.classList.add('sel');}
    if(S.exercise.dur)document.getElementById('ex-dur').value=S.exercise.dur;
  }
  renderFood();updateHome();
}

/* init */
if(!S.foodsDate)S.foodsDate=todayKey();
checkRollover();
restoreUI();
setInterval(()=>{ if(checkRollover()){ renderFood();updateHome();updateSummary();restoreExerciseUI();toast('已進入新的一天，今日紀錄已重置'); } }, 60*1000);

function restoreExerciseUI(){
  const tog=document.getElementById('ex-tgl');
  tog.classList.remove('on');tog.setAttribute('aria-checked','false');
  document.getElementById('ex-detail').style.display='none';
  document.getElementById('ex-save-wrap').style.display='none';
  document.getElementById('ex-hint').textContent='點擊開啟';
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('ex-dur').value='';
}

function saveWeight(){
  const w=parseFloat(document.getElementById('w-kg').value);
  if(!w||w<30||w>200){toast('請輸入有效體重 (30–200 kg)');return;}
  const dt=document.getElementById('w-date').value||todayKey();
  S.profile.weight=w;
  if(!S.weightLog)S.weightLog=[];
  const idx=S.weightLog.findIndex(r=>r.date===dt);
  if(idx>=0)S.weightLog[idx].kg=w;
  else S.weightLog.push({date:dt,kg:w});
  S.weightLog.sort((a,b)=>a.date.localeCompare(b.date));
  document.getElementById('h-wt-val').textContent=w.toFixed(1);
  save();updateHome();toast('體重已儲存 ✓');
}

function calcTDEE(){
  const w=S.profile.weight;const h=parseFloat(document.getElementById('t-h').value);
  const age=parseInt(document.getElementById('t-age').value);
  const sex=document.getElementById('t-sex').value;const act=parseFloat(document.getElementById('t-act').value);
  if(!w){toast('請先儲存體重');return;}
  if(!h||!age){toast('請填寫身高與年齡');return;}
  const bmr=sex==='male'?88.362+13.397*w+4.799*h-5.677*age:447.593+9.247*w+3.098*h-4.330*age;
  S.profile.bmr=Math.round(bmr);S.profile.tdee=Math.round(bmr*act);
  document.getElementById('r-bmr').textContent=S.profile.bmr.toLocaleString();
  document.getElementById('r-tdee').textContent=S.profile.tdee.toLocaleString();
  document.getElementById('h-tdee-val').textContent=S.profile.tdee.toLocaleString();
  save();updateHome();toast('TDEE 計算完成 ✓');
}

function addFood(){
  const name=document.getElementById('f-name').value.trim();
  const cal=parseInt(document.getElementById('f-cal').value);
  if(!name||!cal||cal<0){toast('請填寫名稱與熱量');return;}
  S.foods.push({name,cal,id:Date.now()});
  document.getElementById('f-name').value='';document.getElementById('f-cal').value='';
  saveCalLog();renderFood();updateHome();save();toast('已加入記錄 ✓');
}

function removeFood(id){
  S.foods=S.foods.filter(f=>f.id!==id);
  saveCalLog();renderFood();updateHome();save();
}

function saveCalLog(){
  if(!S.calLog)S.calLog={};
  S.calLog[todayKey()]=S.foods.reduce((a,f)=>a+f.cal,0);
}

function renderFood(){
  const total=S.foods.reduce((a,f)=>a+f.cal,0);
  document.getElementById('f-total').textContent=total.toLocaleString()+' kcal';
  document.getElementById('h-total-badge').textContent=total.toLocaleString()+' kcal';
  ['f-list','h-food-list'].forEach(elId=>{
    const el=document.getElementById(elId);
    if(!S.foods.length){el.innerHTML='<div class="empty">尚未記錄任何食物</div>';return;}
    const del=elId==='f-list';
    el.innerHTML=S.foods.map(f=>`<div class="food-item"><div><div style="font-size:16px">${f.name}</div><div style="font-size:14px;color:var(--text2);margin-top:2px">${f.cal.toLocaleString()} kcal</div></div>${del?`<button class="fdel" onclick="removeFood(${f.id})" aria-label="刪除">✕</button>`:''}</div>`).join('');
  });
}

function updateHome(){
  const total=S.foods.reduce((a,f)=>a+f.cal,0);
  document.getElementById('h-total').textContent=total.toLocaleString();
  const tdee=S.profile.tdee;
  if(tdee){
    const diff=tdee-total;const pct=Math.min(Math.round(total/tdee*100),100);
    document.getElementById('h-bar').style.width=pct+'%';
    document.getElementById('h-pct').textContent=pct+'%';
    if(diff>0){document.getElementById('h-remain').textContent='還差 '+diff.toLocaleString()+' kcal';document.getElementById('h-sub').textContent='熱量赤字 '+diff.toLocaleString()+' kcal';}
    else if(diff===0){document.getElementById('h-remain').textContent='剛好達標';document.getElementById('h-sub').textContent='達到 TDEE 目標！';}
    else{document.getElementById('h-remain').textContent='超標 '+Math.abs(diff).toLocaleString()+' kcal';document.getElementById('h-sub').textContent='已超過 TDEE '+Math.abs(diff).toLocaleString()+' kcal';}
  }
}

let exSel='';
function toggleEx(){
  S.exercise.on=!S.exercise.on;
  const tog=document.getElementById('ex-tgl');
  tog.classList.toggle('on',S.exercise.on);tog.setAttribute('aria-checked',S.exercise.on);
  document.getElementById('ex-detail').style.display=S.exercise.on?'block':'none';
  document.getElementById('ex-save-wrap').style.display=S.exercise.on?'block':'none';
  document.getElementById('ex-hint').textContent=S.exercise.on?'選擇類型並儲存':'點擊開啟';
  if(!S.exercise.on){S.exercise.type='';S.exercise.dur='';exSel='';document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('sel'));save();}
  updateSummary();
}

function selType(type,btn){exSel=type;document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}

function saveEx(){
  if(!exSel){toast('請選擇運動類型');return;}
  const dur=parseInt(document.getElementById('ex-dur').value);
  if(!dur||dur<1){toast('請輸入運動時長');return;}
  S.exercise.type=exSel;S.exercise.dur=dur;
  save();toast('運動已記錄 ✓');updateSummary();
}

function updateSummary(){
  const total=S.foods.reduce((a,f)=>a+f.cal,0);
  document.getElementById('s-in').textContent=total.toLocaleString();
  document.getElementById('s-td').textContent=S.profile.tdee?S.profile.tdee.toLocaleString():'—';
  const badge=document.getElementById('s-bdg');
  if(S.profile.tdee){const diff=S.profile.tdee-total;if(diff>0)badge.innerHTML=`<span class="bdg bdg-g">赤字 ${diff.toLocaleString()} kcal</span>`;else if(diff===0)badge.innerHTML=`<span style="font-size:14px;color:var(--text2)">達到 TDEE 目標</span>`;else badge.innerHTML=`<span class="bdg bdg-r">超標 ${Math.abs(diff).toLocaleString()} kcal</span>`;}
  else{badge.innerHTML='';}
  const names={weight:'重訓',run:'慢跑',bike:'騎腳踏車',swim:'游泳'};
  const exTag=document.getElementById('s-ex');
  if(S.exercise.on&&S.exercise.type&&S.exercise.dur)exTag.textContent=`今日運動：${names[S.exercise.type]} ${S.exercise.dur} 分鐘`;
  else if(S.exercise.on)exTag.textContent='今天有運動（尚未儲存詳情）';
  else exTag.textContent='今天尚未運動';
}

/* ── chart ── */
function monthKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function daysInMonth(d){return new Date(d.getFullYear(),d.getMonth()+1,0).getDate();}

function prevMonth(){chartMonth.setMonth(chartMonth.getMonth()-1);updateChartMonth();drawCharts();}
function nextMonth(){
  const now=new Date();now.setDate(1);
  if(chartMonth>=now)return;
  chartMonth.setMonth(chartMonth.getMonth()+1);updateChartMonth();drawCharts();
}

function updateChartMonth(){
  const names=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('chart-month-label').textContent=chartMonth.getFullYear()+'年 '+names[chartMonth.getMonth()];
}
updateChartMonth();

function isDark(){return window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;}

function drawCharts(){drawCalChart();drawWtChart();renderWtList();}

function drawCalChart(){
  const canvas=document.getElementById('cal-chart');
  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth||300;const H=180;
  canvas.width=W*2;canvas.height=H*2;ctx.scale(2,2);

  const days=daysInMonth(chartMonth);
  const mk=monthKey(chartMonth);
  const calLog=S.calLog||{};
  const vals=[];
  for(let d=1;d<=days;d++){
    const key=mk+'-'+String(d).padStart(2,'0');
    vals.push(calLog[key]||0);
  }

  const tdee=S.profile.tdee||0;
  const maxVal=Math.max(tdee*1.3,...vals,100);
  const pad={l:36,r:8,t:8,b:28};
  const chartW=W-pad.l-pad.r;
  const chartH=H-pad.t-pad.b;
  const dark=isDark();
  const textClr=dark?'rgba(255,255,255,0.5)':'rgba(0,0,0,0.4)';
  const gridClr=dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)';

  ctx.clearRect(0,0,W,H);

  [0,0.25,0.5,0.75,1].forEach(t=>{
    const y=pad.t+chartH*(1-t);
    ctx.strokeStyle=gridClr;ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    const lbl=Math.round(maxVal*t);
    ctx.fillStyle=textClr;ctx.font='9px -apple-system,sans-serif';ctx.textAlign='right';
    ctx.fillText(lbl>999?(lbl/1000).toFixed(1)+'k':lbl,pad.l-4,y+3);
  });

  const barW=Math.max(2,chartW/days*0.65);
  const gap=chartW/days;
  vals.forEach((v,i)=>{
    const x=pad.l+i*gap+gap/2-barW/2;
    const bh=v>0?Math.max(2,(v/maxVal)*chartH):0;
    const y=pad.t+chartH-bh;
    const over=tdee>0&&v>tdee;
    ctx.fillStyle=over?'rgba(255,59,48,0.85)':'rgba(255,107,0,0.85)';
    ctx.beginPath();ctx.roundRect(x,y,barW,bh,2);ctx.fill();
    if((i+1)%5===0||(i+1)===1){
      ctx.fillStyle=textClr;ctx.font='9px -apple-system,sans-serif';ctx.textAlign='center';
      ctx.fillText(i+1,x+barW/2,H-pad.b+12);
    }
  });

  if(tdee>0){
    const ty=pad.t+chartH*(1-tdee/maxVal);
    ctx.strokeStyle='rgba(0,122,255,0.7)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(pad.l,ty);ctx.lineTo(W-pad.r,ty);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(0,122,255,0.85)';ctx.font='bold 9px -apple-system,sans-serif';ctx.textAlign='right';
    ctx.fillText('TDEE',W-pad.r-2,ty-3);
  }
}

function drawWtChart(){
  const canvas=document.getElementById('wt-chart');
  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth||300;const H=160;
  canvas.width=W*2;canvas.height=H*2;ctx.scale(2,2);

  const mk=monthKey(chartMonth);
  const days=daysInMonth(chartMonth);
  const wlog=S.weightLog||[];
  const pts=[];
  for(let d=1;d<=days;d++){
    const key=mk+'-'+String(d).padStart(2,'0');
    const rec=wlog.find(r=>r.date===key);
    if(rec)pts.push({d,kg:rec.kg});
  }

  const dark=isDark();
  const textClr=dark?'rgba(255,255,255,0.5)':'rgba(0,0,0,0.4)';
  const gridClr=dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)';
  ctx.clearRect(0,0,W,H);

  if(pts.length<1){
    ctx.fillStyle=textClr;ctx.font='13px -apple-system,sans-serif';ctx.textAlign='center';
    ctx.fillText('本月尚無體重紀錄',W/2,H/2);return;
  }

  const kgs=pts.map(p=>p.kg);
  const minKg=Math.min(...kgs)-1;const maxKg=Math.max(...kgs)+1;
  const pad={l:40,r:8,t:12,b:28};
  const chartW=W-pad.l-pad.r;const chartH=H-pad.t-pad.b;

  [0,0.5,1].forEach(t=>{
    const y=pad.t+chartH*(1-t);
    ctx.strokeStyle=gridClr;ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    const lbl=(minKg+(maxKg-minKg)*t).toFixed(1);
    ctx.fillStyle=textClr;ctx.font='9px -apple-system,sans-serif';ctx.textAlign='right';
    ctx.fillText(lbl,pad.l-4,y+3);
  });

  const toX=d=>pad.l+(d-1)/(days-1||1)*chartW;
  const toY=kg=>pad.t+chartH*(1-(kg-minKg)/(maxKg-minKg));

  ctx.strokeStyle='rgba(255,107,0,0.9)';ctx.lineWidth=2;ctx.lineJoin='round';
  ctx.beginPath();
  pts.forEach((p,i)=>{if(i===0)ctx.moveTo(toX(p.d),toY(p.kg));else ctx.lineTo(toX(p.d),toY(p.kg));});
  ctx.stroke();

  pts.forEach(p=>{
    const x=toX(p.d),y=toY(p.kg);
    ctx.fillStyle='#FF6B00';ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FF6B00';ctx.font='bold 9px -apple-system,sans-serif';ctx.textAlign='center';
    ctx.fillText(p.kg.toFixed(1),x,y-7);
    ctx.fillStyle=textClr;ctx.font='9px -apple-system,sans-serif';
    ctx.fillText(p.d,x,H-pad.b+12);
  });
}

function renderWtList(){
  const mk=monthKey(chartMonth);
  const wlog=(S.weightLog||[]).filter(r=>r.date.startsWith(mk));
  const el=document.getElementById('wt-list');
  if(!wlog.length){el.innerHTML='<div class="empty">本月尚無體重紀錄</div>';return;}
  el.innerHTML=wlog.slice().reverse().map((r,i,arr)=>{
    const prev=arr[i+1];
    let diffHtml='';
    if(prev){
      const d=(r.kg-prev.kg).toFixed(1);
      const cls=d>0?'w-up':d<0?'w-dn':'w-eq';
      diffHtml=`<span class="w-diff ${cls}">${d>0?'+':''}${d} kg</span>`;
    }
    return `<div class="w-row"><span class="w-date">${r.date}</span><div style="display:flex;align-items:center"><span class="w-kg">${r.kg.toFixed(1)} kg</span>${diffHtml}</div></div>`;
  }).join('');
}
